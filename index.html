<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信AI - 小手机AI社交应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
        }

        .phone-frame {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 375px;
            height: 812px;
            background: #fff;
            border-radius: 40px;
            border: 10px solid #000;
            box-shadow: 0 0 60px rgba(0,0,0,0.3), inset 0 0 1px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .status-bar {
            height: 44px;
            background: linear-gradient(to bottom, #f5f5f5, #f0f0f0);
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .app-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .bottom-nav {
            height: 60px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 8px 0;
            border: none;
            background: none;
            color: #999;
            font-size: 12px;
            transition: color 0.3s;
        }

        .nav-btn.active {
            color: #09b83e;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 聊天相关样式 */
        .chat-list {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:active {
            background: #f9f9f9;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 20px;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-name {
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 12px;
            color: #ccc;
        }

        /* 聊天窗口样式 */
        .chat-window {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-window.active {
            display: flex;
        }

        .chat-header {
            height: 50px;
            background: linear-gradient(to bottom, #f5f5f5, #f0f0f0);
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 15px;
        }

        .chat-header-back {
            position: absolute;
            left: 15px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #000;
        }

        .chat-header-title {
            font-weight: 600;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .message-bubble {
            max-width: 240px;
            padding: 10px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            animation: slideIn 0.3s ease-out;
        }

        .message.user .message-bubble {
            background: #09b83e;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            background: #f0f0f0;
            color: #000;
            border-bottom-left-radius: 4px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-input-area {
            height: 60px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
        }

        .chat-send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #09b83e;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* 朋友圈样式 */
        .moments-list {
            padding: 0;
            overflow-y: auto;
        }

        .moment-item {
            padding: 15px;
            border-bottom: 8px solid #f5f5f5;
            background: #fff;
        }

        .moment-header {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .moment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .moment-user-info {
            flex: 1;
        }

        .moment-name {
            font-weight: 600;
            font-size: 14px;
            color: #000;
        }

        .moment-time {
            font-size: 12px;
            color: #999;
        }

        .moment-content {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            margin: 10px 0;
        }

        .moment-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0;
        }

        .moment-image {
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .moment-actions {
            display: flex;
            gap: 20px;
            padding: 10px 0;
            border-top: 1px solid #f0f0f0;
            margin-top: 10px;
            font-size: 13px;
        }

        .moment-action-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .moment-likes {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 8px;
        }

        .moment-comments {
            background: #f5f5f5;
            border-radius: 8px;
            margin-top: 8px;
            overflow: hidden;
        }

        .moment-comment {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            line-height: 1.4;
        }

        .moment-comment:last-child {
            border-bottom: none;
        }

        .moment-comment-name {
            color: #09b83e;
            font-weight: 600;
            margin-right: 4px;
        }

        /* 论坛样式 */
        .forum-list {
            overflow-y: auto;
        }

        .forum-post {
            padding: 15px;
            border-bottom: 8px solid #f5f5f5;
            background: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        .forum-post:active {
            background: #f9f9f9;
        }

        .forum-header {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .forum-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .forum-user-info {
            flex: 1;
        }

        .forum-username {
            font-weight: 600;
            font-size: 14px;
            color: #000;
        }

        .forum-meta {
            font-size: 12px;
            color: #999;
        }

        .forum-title {
            font-weight: 600;
            font-size: 16px;
            color: #000;
            margin: 10px 0;
            line-height: 1.4;
        }

        .forum-content {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .forum-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .forum-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
        }

        .forum-stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #999;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        /* 设置样式 */
        .settings-container {
            padding: 15px;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-title {
            font-weight: 600;
            font-size: 14px;
            color: #000;
            margin-bottom: 12px;
            padding-left: 10px;
            border-left: 3px solid #09b83e;
        }

        .settings-item {
            background: #fff;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #f0f0f0;
        }

        .settings-label {
            font-size: 14px;
            color: #333;
        }

        .settings-input {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            width: 100px;
        }

        .settings-toggle {
            width: 50px;
            height: 30px;
            border-radius: 15px;
            background: #e0e0e0;
            border: none;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .settings-toggle.on {
            background: #09b83e;
        }

        .settings-toggle-circle {
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 13px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .settings-toggle.on .settings-toggle-circle {
            left: 22px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            width: 100%;
            max-height: 500px;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            min-height: 100px;
            resize: vertical;
        }

        .form-button {
            width: 100%;
            padding: 12px;
            background: #09b83e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .form-button:active {
            background: #06a031;
        }

        /* 角色卡片 */
        .character-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #f0f0f0;
        }

        .character-header {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            align-items: center;
        }

        .character-avatar-large {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .character-name {
            font-weight: 600;
            font-size: 15px;
            color: #000;
        }

        .character-world {
            font-size: 12px;
            color: #999;
        }

        .character-info {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin: 8px 0;
        }

        .character-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .character-action-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .character-action-btn:active {
            background: #f5f5f5;
        }

        .character-action-btn.primary {
            background: #09b83e;
            color: white;
            border: none;
        }

        /* 虚拟红包样式 */
        .redpacket {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 15px 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .redpacket:active {
            transform: scale(0.95);
        }

        .redpacket-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .redpacket-amount {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .redpacket-from {
            font-size: 12px;
            opacity: 0.9;
        }

        /* 知识库样式 */
        .knowledge-list {
            padding: 15px;
            overflow-y: auto;
        }

        .knowledge-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #f0f0f0;
        }

        .knowledge-title {
            font-weight: 600;
            font-size: 14px;
            color: #000;
            margin-bottom: 4px;
        }

        .knowledge-content {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .knowledge-time {
            font-size: 12px;
            color: #999;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .phone-frame {
                width: 100%;
                height: 100%;
                border-radius: 0;
                border: none;
                top: 0;
                left: 0;
                transform: none;
            }
        }

        /* 滚动条美化 */
        .content-area::-webkit-scrollbar,
        .chat-messages::-webkit-scrollbar,
        .moments-list::-webkit-scrollbar,
        .knowledge-list::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track,
        .chat-messages::-webkit-scrollbar-track,
        .moments-list::-webkit-scrollbar-track,
        .knowledge-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-area::-webkit-scrollbar-thumb,
        .chat-messages::-webkit-scrollbar-thumb,
        .moments-list::-webkit-scrollbar-thumb,
        .knowledge-list::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #09b83e;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span>9:41</span>
            <span style="flex: 1; text-align: center;">微信</span>
            <span>🔋</span>
        </div>

        <!-- 应用容器 -->
        <div class="app-container">
            <!-- 聊天列表页面 -->
            <div id="page-chat" class="content-area">
                <div class="chat-list" id="chatList">
                    <!-- 聊天列表项会被动态添加 -->
                </div>
            </div>

            <!-- 聊天窗口页面 -->
            <div id="page-chat-window" class="content-area chat-window">
                <div class="chat-header">
                    <button class="chat-header-back" onclick="app.backToChatList()">← 返回</button>
                    <div class="chat-header-title" id="chatTitle">角色名</div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="发送消息...">
                    <button class="chat-send-btn" onclick="app.sendMessage()">📤</button>
                </div>
            </div>

            <!-- 朋友圈页面 -->
            <div id="page-moments" class="content-area moments-list" id="momentsList">
                <!-- 朋友圈内容会被动态添加 -->
            </div>

            <!-- 论坛页面 -->
            <div id="page-forum" class="content-area forum-list" id="forumList">
                <!-- 论坛内容会被动态添加 -->
            </div>

            <!-- 我的页面 -->
            <div id="page-me" class="content-area" style="padding: 15px; overflow-y: auto;">
                <div style="background: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px;">
                    <div style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 10px;">👤</div>
                    <div style="font-weight: 600; font-size: 16px; margin-bottom: 4px;" id="userNickname">用户昵称</div>
                    <div style="font-size: 12px; color: #999;">我的个人页面</div>
                </div>

                <button class="form-button" onclick="app.openModal('addCharacterModal')" style="margin-bottom: 10px;">➕ 添加新角色</button>
                <button class="form-button" onclick="app.openModal('userSettingsModal')" style="margin-bottom: 10px; background: #666;">⚙️ 用户设置</button>
                <button class="form-button" onclick="app.openModal('appSettingsModal')" style="background: #999;">🎨 应用设置</button>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <button class="nav-btn active" onclick="app.switchPage('chat')">
                <div class="nav-icon">💬</div>
                <div>聊天</div>
            </button>
            <button class="nav-btn" onclick="app.switchPage('moments')">
                <div class="nav-icon">🌟</div>
                <div>朋友圈</div>
            </button>
            <button class="nav-btn" onclick="app.switchPage('forum')">
                <div class="nav-icon">💭</div>
                <div>论坛</div>
            </button>
            <button class="nav-btn" onclick="app.switchPage('me')">
                <div class="nav-icon">👤</div>
                <div>我的</div>
            </button>
        </div>
    </div>

    <!-- 模态框 -->

    <!-- 添加角色模态框 -->
    <div id="addCharacterModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="app.closeModal('addCharacterModal')">✕</button>
            <div class="modal-title">创建新角色</div>
            
            <div class="form-group">
                <label class="form-label">选择方式</label>
                <div style="display: flex; gap: 10px;">
                    <button class="form-button" style="background: #09b83e; flex: 1;" onclick="app.toggleCharacterMode('auto')">🤖 自动生成</button>

    <script>
        // ============================================
        // 核心应用系统
        // ============================================

        const app = {
            // 当前状态
            state: {
                currentPage: 'chat',
                currentCharacterId: null,
                characters: [],
                messages: {},
                moments: [],
                forumPosts: [],
                userSettings: {
                    nickname: '用户',
                    identity: '朋友',
                    bio: ''
                },
                appSettings: {
                    bubbleRadius: 18,
                    fontSize: 15,
                    lineHeight: 1.4,
                    chatFrequency: 'often',
                    momentFrequency: 'sometimes',
                    redpacketFrequency: 'sometimes'
                }
            },

            // 初始化应用
            init() {
                this.loadData();
                this.createSampleData();
                this.render();
                this.registerEventListeners();
            },

            // 创建示例数据
            createSampleData() {
                if (this.state.characters.length === 0) {
                    this.state.characters = [

                        },
                        {

                            avatar: '👩',
                            age: 26,
                            height: '167cm',
                            personality: '理性、冷静、善于分析',
                            speech: '直接、实在、有点冷漠',
                            abilities: '咒术师、战斗能力强',
                            background: '自由咒术师',
                            relation: '工作伙伴',
                            color: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'
                        },
                        {
                            id: 3,
                            name: '伊地知潔高',
                            world: '咒术回战',
                            avatar: '😊',
                            age: 16,
                            height: '172cm',
                            personality: '活泼、热情、善良',
                            speech: '热情、爽朗、经常笑',
                            abilities: '咒术师、新人',
                            background: '学生',
                            relation: '学弟学妹',
                            color: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'
                        }
                    ];

                    // 初始化消息
                    this.state.characters.forEach(char => {
                        this.state.messages[char.id] = [
                            { id: 1, type: 'ai', text: `你好！我是${char.name}，很高兴认识你！` },
                        ];
                    });

                    // 创建示例朋友圈
                    this.state.moments = [
                        {
                            id: 1,
                            author: '五条悟',
                            avatar: '🤍',
                            content: '今天天气真不错，适合去执行任务~',
                            images: ['📸'],
                            likes: ['冥冥', '伊地知'],
                            comments: [
                                { author: '冥冥', text: '确实不错，一起去吧' },
                                { author: '伊地知', text: '我也想去！' }
                            ],
                            time: '2小时前'
                        },
                        {
                            id: 2,
                            author: '冥冥',
                            avatar: '👩',
                            content: '接到一个有趣的委托，可能需要五条的帮助。',
                            images: [],
                            likes: ['五条悟'],
                            comments: [],
                            time: '4小时前'
                        }
                    ];

                    // 创建示例论坛帖子
                    this.state.forumPosts = [
                        {
                            id: 1,
                            author: '五条悟',
                            avatar: '🤍',
                            title: '如何有效地提升咒术水平？',
                            content: '最近在思考咒术的修行方法，有哪位高人可以指点一下？我的想法是多做任务来积累经验...',
                            tags: ['#咒术', '#修行', '#讨论'],
                            comments: 12,
                            likes: 8,
                            views: 156,
                            time: '1小时前'
                        },
                        {
                            id: 2,
                            author: '伊地知',
                            avatar: '😊',
                            title: '新人小白求助，怎样才能不被诅咒打败？',
                            content: '我是个新手咒术师，最近执行任务时总是有点害怕。要不要先从简单任务开始啊？',
                            tags: ['#新手', '#求助', '#咒术'],
                            comments: 24,
                            likes: 45,
                            views: 320,
                            time: '3小时前'
                        }
                    ];

                    this.saveData();
                }
            },

            // 切换页面
            switchPage(page) {
                this.state.currentPage = page;
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                event.target.closest('.nav-btn').classList.add('active');
                this.render();
            },

            // 渲染界面
            render() {
                // 隐藏所有页面
                document.querySelectorAll('.content-area').forEach(el => {
                    el.style.display = 'none';
                });

                // 显示当前页面
                const currentPageEl = document.getElementById(`page-${this.state.currentPage}`);
                if (currentPageEl) {
                    currentPageEl.style.display = 'flex';
                }

                // 根据页面类型渲染内容
                if (this.state.currentPage === 'chat') {
                    this.renderChatList();
                } else if (this.state.currentPage === 'moments') {
                    this.renderMomentsList();
                } else if (this.state.currentPage === 'forum') {
                    this.renderForumList();
                }
            },

            // 渲染聊天列表
            renderChatList() {
                const chatList = document.getElementById('chatList');
                chatList.innerHTML = '';

                this.state.characters.forEach(char => {
                    const messages = this.state.messages[char.id] || [];
                    const lastMessage = messages[messages.length - 1];
                    const preview = lastMessage ? lastMessage.text : '暂无消息';

                    const item = document.createElement('div');
                    item.className = 'chat-item';
                    item.onclick = () => this.openChat(char.id);
                    item.innerHTML = `
                        <div class="chat-avatar" style="background: ${char.color}">${char.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${char.name}</div>
                            <div class="chat-preview">${preview}</div>
                        </div>
                        <div class="chat-time">刚刚</div>
                    `;
                    chatList.appendChild(item);
                });
            },

            // 打开聊天窗口
            openChat(characterId) {
                this.state.currentCharacterId = characterId;
                const char = this.state.characters.find(c => c.id === characterId);
                
                document.getElementById('page-chat').style.display = 'none';
                document.getElementById('page-chat-window').classList.add('active');
                document.getElementById('chatTitle').textContent = char.name;
                document.getElementById('chatInput').focus();
                
                this.renderChatMessages();
            },

            // 返回聊天列表
            backToChatList() {
                document.getElementById('page-chat-window').classList.remove('active');
                document.getElementById('page-chat').style.display = 'flex';
                this.state.currentCharacterId = null;
                this.render();
            },

            // 渲染聊天消息
            renderChatMessages() {
                const chatMessages = document.getElementById('chatMessages');
                const messages = this.state.messages[this.state.currentCharacterId] || [];
                
                chatMessages.innerHTML = '';
                messages.forEach(msg => {
                    const msgEl = document.createElement('div');
                    msgEl.className = `message ${msg.type}`;
                    
                    const avatar = msg.type === 'user' ? '👤' : this.state.characters.find(c => c.id === this.state.currentCharacterId)?.avatar;
                    const avatarBg = msg.type === 'user' ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : this.state.characters.find(c => c.id === this.state.currentCharacterId)?.color;
                    
                    msgEl.innerHTML = `
                        ${msg.type === 'ai' ? `<div class="message-avatar" style="background: ${avatarBg}">${avatar}</div>` : ''}
                        <div class="message-bubble">${msg.text}</div>
                        ${msg.type === 'user' ? `<div class="message-avatar" style="background: ${avatarBg}">${avatar}</div>` : ''}
                    `;
                    chatMessages.appendChild(msgEl);
                });
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            },

            // 发送消息
            sendMessage() {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                
                if (!text) return;

                const messages = this.state.messages[this.state.currentCharacterId];
                messages.push({
                    id: messages.length + 1,
                    type: 'user',
                    text: text
                });

                input.value = '';
                this.renderChatMessages();

                // 模拟AI回复
                setTimeout(() => {
                    const aiResponse = this.generateAIResponse(this.state.currentCharacterId, text);
                    messages.push({
                        id: messages.length + 1,
                        type: 'ai',
                        text: aiResponse
                    });
                    this.renderChatMessages();
                    this.saveData();
                }, 800);
            },

            // 生成AI回复
            generateAIResponse(characterId, userMessage) {
                const char = this.state.characters.find(c => c.id === characterId);
                const responses = {
                    1: [ // 五条悟
                        '呵呵，有意思。',
                        '你说的有一定道理。',
                        '我很赞同你的看法。',
                        '确实如此，这就是我喜欢和你聊天的原因。',
                        '你的想法总是出乎我的意料。'
                    ],
                    2: [ // 冥冥
                        '嗯，我同意。',
                        '这个想法不错。',
                        '我正好有个委托要做，要一起吗？',
                        '看来你有所成长啊。',
                        '有趣。'
                    ],
                    3: [ // 伊地知
                        '哈哈，你说得对！',
                        '我也是这样想的呢！',
                        '太棒了！我们一起加油吧！',
                        '好的！我会认真对待的！',
                        '你真厉害！'
                    ]
                };

                const charResponses = responses[characterId] || ['确实如此。'];
                return charResponses[Math.floor(Math.random() * charResponses.length)];
            },

            // 渲染朋友���
            renderMomentsList() {
                const momentsList = document.getElementById('momentsList');
                momentsList.innerHTML = '';

                this.state.moments.forEach(moment => {
                    const momentEl = document.createElement('div');
                    momentEl.className = 'moment-item';
                    
                    let imagesHTML = '';
                    if (moment.images && moment.images.length > 0) {
                        imagesHTML = `
                            <div class="moment-images">
                                ${moment.images.map(img => `<div class="moment-image">${img}</div>`).join('')}
                            </div>
                        `;
                    }

                    let commentsHTML = '';
                    if (moment.comments && moment.comments.length > 0) {
                        commentsHTML = `
                            <div class="moment-comments">
                                ${moment.comments.map(comment => `
                                    <div class="moment-comment">
                                        <span class="moment-comment-name">${comment.author}</span>
                                        <span>${comment.text}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    momentEl.innerHTML = `
                        <div class="moment-header">
                            <div class="moment-avatar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">${moment.avatar}</div>
                            <div class="moment-user-info">
                                <div class="moment-name">${moment.author}</div>
                                <div class="moment-time">${moment.time}</div>
                            </div>
                        </div>
                        <div class="moment-content">${moment.content}</div>
                        ${imagesHTML}
                        <div class="moment-actions">
                            <button class="moment-action-btn" onclick="app.likeMoment(${moment.id})">👍 赞</button>
                            <button class="moment-action-btn" onclick="app.commentMoment(${moment.id})">💬 评论</button>
                        </div>
                        ${moment.likes && moment.likes.length > 0 ? `
                            <div class="moment-likes">
                                ${moment.likes.map(like => `<span style="margin-right: 6px;">${like}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${commentsHTML}
                    `;
                    momentsList.appendChild(momentEl);
                });
            },

            // 点赞朋友圈
            likeMoment(momentId) {
                const moment = this.state.moments.find(m => m.id === momentId);
                if (!moment.likes) moment.likes = [];
                
                const userIndex = moment.likes.indexOf(this.state.userSettings.nickname);
                if (userIndex === -1) {
                    moment.likes.push(this.state.userSettings.nickname);
                } else {
                    moment.likes.splice(userIndex, 1);
                }
                
                this.renderMomentsList();
                this.saveData();
            },

            // 评论朋友圈
            commentMoment(momentId) {
                const comment = prompt('输入评论：');
                if (!comment) return;

                const moment = this.state.moments.find(m => m.id === momentId);
                if (!moment.comments) moment.comments = [];
                
                moment.comments.push({
                    author: this.state.userSettings.nickname,
                    text: comment
                });
                
                this.renderMomentsList();
                this.saveData();
            },

            // 渲染论坛列表
            renderForumList() {
                const forumList = document.getElementById('forumList');
                forumList.innerHTML = '';

                this.state.forumPosts.forEach(post => {
                    const postEl = document.createElement('div');
                    postEl.className = 'forum-post';
                    
                    postEl.innerHTML = `
                        <div class="forum-header">
                            <div class="forum-avatar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">${post.avatar}</div>
                            <div class="forum-user-info">
                                <div class="forum-username">${post.author}</div>
                                <div class="forum-meta">${post.time}</div>
                            </div>
                        </div>
                        <div class="forum-title">${post.title}</div>
                        <div class="forum-content">${post.content}</div>
                        <div class="forum-tags">
                            ${post.tags.map(tag => `<span class="forum-tag">${tag}</span>`).join('')}
                        </div>
                        <div class="forum-stats">
                            <span>👍 ${post.likes}</span>
                            <span>💬 ${post.comments}</span>
                            <span>👁️ ${post.views}</span>
                        </div>
                    `;
                    forumList.appendChild(postEl);
                });
            },

            // 打开模态框
            openModal(modalId) {
                document.getElementById(modalId).classList.add('show');
            },

            // 关闭模态框
            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('show');
            },

            // 切换角色创建模式
            toggleCharacterMode(mode) {
                const autoMode = document.getElementById('autoCharacterMode');
                const manualMode = document.getElementById('manualCharacterMode');
                
                if (mode === 'auto') {
                    autoMode.style.display = 'block';
                    manualMode.style.display = 'none';
                } else {
                    autoMode.style.display = 'none';
                    manualMode.style.display = 'block';
                }
            },

            // 创建角色
            createCharacter() {
                const autoInput = document.getElementById('autoCharacterInput').value.trim();
                
                let character;
                
                if (autoInput) {
                    // 自动生成模式
                    const [world, name] = autoInput.split('-');
                    if (!world || !name) {
                        alert('请输入正确的格式：世界名-角色名');
                        return;
                    }

                    character = this.generateCharacterFromTemplate(world.trim(), name.trim());
                } else {
                    // 手动创建模式
                    const name = document.getElementById('characterName').value.trim();
                    if (!name) {
                        alert('请输入角色名字');
                        return;
                    }

                    character = {
                        id: this.state.characters.length + 1,
                        name: name,
                        world: document.getElementById('characterWorld').value || '原创',
                        avatar: '🎭',
                        age: document.getElementById('characterAge').value || '未知',
                        height: document.getElementById('characterHeight').value || '未知',
                        personality: document.getElementById('characterPersonality').value || '',
                        speech: document.getElementById('characterSpeech').value || '',
                        abilities: document.getElementById('characterAbilities').value || '',
                        background: document.getElementById('characterBackground').value || '',
                        relation: document.getElementById('characterRelation').value || '',
                        color: `hsl(${Math.random() * 360}, 70%, 60%)`
                    };
                }

                this.state.characters.push(character);
                this.state.messages[character.id] = [{
                    id: 1,
                    type: 'ai',
                    text: `你好！我是${character.name}，很高兴认识你！`
                }];

                this.closeModal('addCharacterModal');
                this.renderChatList();
                this.saveData();
